services:

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # При первом запуске (пустой volume) postgres автоматически выполняет все
  # SQL-файлы из /docker-entrypoint-initdb.d/ — так применяется миграция.
  # При повторных запусках init-скрипты игнорируются (данные уже есть).
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: diploma_postgres
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB:       ${DB_NAME:-diploma}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql:ro
      - ./migrations/002_add_has_images.sql:/docker-entrypoint-initdb.d/02_add_has_images.sql:ro
      - ./migrations/003_add_must_change_password.sql:/docker-entrypoint-initdb.d/03_add_must_change_password.sql:ro
      - ./migrations/004_bootstrap_admin.sql:/docker-entrypoint-initdb.d/04_bootstrap_admin.sql:ro
      - ./migrations/005_library_threads.sql:/docker-entrypoint-initdb.d/05_library_threads.sql:ro
      - ./migrations/006_rule_sets.sql:/docker-entrypoint-initdb.d/06_rule_sets.sql:ro
    ports:
      - "${DB_EXPOSE_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-diploma}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability — all-in-one стек Grafana (Grafana + Tempo + Loki + Prometheus
  # + OpenTelemetry Collector в одном контейнере). Принимает OTLP HTTP на
  # :4318 и отдаёт UI Grafana на :3000
  # ---------------------------------------------------------------------------
  observability:
    image: grafana/otel-lgtm:latest
    container_name: diploma_lgtm
    ports:
      - "3000:3000"   # Grafana UI
      - "4318:4318"   # OTLP HTTP receiver (трейсы и логи от api)
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Go API — инстанс 1
  # Стартует только после того, как postgres прошёл healthcheck.
  # DB_HOST=postgres — внутри сети compose сервисы доступны по имени.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diploma_api
    environment:
      INSTANCE_ID: "1"              # см. handler GET /instance
      APP_PORT:   ${APP_PORT:-8080}
      DB_HOST:    postgres
      DB_PORT:    5432
      DB_USER:    ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME:    ${DB_NAME:-diploma}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://observability:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: diploma-api
    volumes:
      - ./files:/files
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Go API — инстанс 2 (тот же код, тот же образ, но отличается INSTANCE_ID
  # и портом снаружи). Демонстрация концепции «локальные кластеры»: один
  # backend, несколько реплик с разной конфигурацией через env-переменные.
  # Использует ту же БД, что и api инстанс 1.
  # ---------------------------------------------------------------------------
  api2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diploma_api2
    environment:
      INSTANCE_ID: "2"
      APP_PORT:   "8080"
      DB_HOST:    postgres
      DB_PORT:    5432
      DB_USER:    ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME:    ${DB_NAME:-diploma}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://observability:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: diploma-api
    volumes:
      - ./files:/files
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Именованный volume — данные PostgreSQL переживают docker compose down
# Для сброса БД: docker compose down -v
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
