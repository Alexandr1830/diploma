version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

  settings:
    errcheck:
      # Не ругаться на defer Close() — это стандартный паттерн в Go,
      # ошибка при закрытии файла/курсора почти всегда не actionable.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (*archive/zip.ReadCloser).Close
    staticcheck:
      # QF* — это quick-fix-предложения по стилю (типа «примените законы
      # де Моргана»), не настоящие баги. Отключаем, чтобы линтер не цеплялся
      # к читаемым условиям.
      checks:
        - all
        - -QF1001  # законы де Моргана — стилистика, не бага
        - -QF1003  # switch вместо if — стилистика
        - -QF1008  # лишние имена в селекторах — стилистика
        - -ST1000  # требование package comment — для библиотек, не для внутренних пакетов

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

exclude:
  paths:
    - frontend
    - migrations
