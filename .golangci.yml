version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (*archive/zip.ReadCloser).Close
    staticcheck:
      checks:
        - all
        - -QF1001
        - -QF1003
        - -QF1008
        - -ST1000

  exclusions:
    paths:
      - frontend
      - migrations

formatters:
  enable:
    - gofmt

  exclusions:
    paths:
      - frontend
      - migrations

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
